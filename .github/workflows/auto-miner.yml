name: 🤖 Auto-Miner

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:      # Manual trigger + API trigger

jobs:
  mine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
          pip install openrouter litcoiin requests
          
      - name: Run Litcoiin Miner
        env:
          BANKR_KEY: ${{ secrets.BANKR_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ALCHEMY_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: |
          echo "Starting mining run at $(date)"
          export BASE_RPC_URL="https://base-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
          # python projects/litcoin/miner-v4.py || true
          echo "Mining run complete"
          
      - name: Commit solutions
        run: |
          git config --local user.email "manteclaw@github.com"
          git config --local user.name "Manteclaw Bot"
          git add -A || true
          git commit -m "🤖 Auto-miner run $(date -u +%Y-%m-%d-%H:%M)" || true
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
