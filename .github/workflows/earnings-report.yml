name: 📊 Earnings Report

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Generate Report
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          BANKR_KEY: ${{ secrets.BANKR_API_KEY }}
          ALCHEMY_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: |
          export BASE_RPC_URL="https://base-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
          python3 projects/dune/dune_utils.py monitor || true
          echo "Earnings report generated at $(date)"
          
      - name: Commit Report
        run: |
          git config --local user.email "manteclaw@github.com"
          git config --local user.name "Manteclaw Bot"
          git add -A || true
          git commit -m "📊 Daily earnings report $(date -u +%Y-%m-%d)" || true
          
      - name: Push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
